apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: connector
  namespace: gsb
spec:
  replicas: 3
  serviceName: connector-headless
  selector:
    matchLabels:
      app: connector
      adventure: connector
  template:
    metadata:
      labels:
        app: connector
        adventure: connector
    spec:
      containers:
      - name: connector
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        command:
        - /bin/sh
        - -c
        - |
          # 提取序号
          ORDINAL=$(echo $POD_NAME | awk -F'-' '{print $NF}')
          
          # 动态生成配置文件
          cat > /etc/nginx/conf.d/default.conf << EOF
          server {
              listen 80;
              server_name _;
              
              location / {
                  return 200 "connector-blue-$ORDINAL\n";
                  add_header Content-Type text/plain;
              }
          }
          EOF
          
          # 启动 nginx
          nginx -g 'daemon off;'
      # 不需要任何 volume 挂载
---
apiVersion: v1
kind: Service
metadata:
  name: connector-headless
  namespace: gsb
spec:
  clusterIP: None
  selector:
    app: connector
    adventure: connector
  ports:
  - port: 80
    targetPort: 80
